# Per-repo overrides: force a repo into a named category regardless of topics.
overrides:
  # sml-script is a Bitcoin Script stack machine, not general dev tooling.
  sml-script: Blockchain & cryptocurrency
  # sml-serve is the web stack's socket adapter (currently a design doc).
  sml-serve: Web, networking & protocols
  # Generic `tool`/`ast`/`type-theory`/`string-matching` topics pull these into
  # Developer tooling / Parsing by first-match; pin them where they belong.
  sml-window: GUI, terminal & application UI
  sml-httpc-tool: Web, networking & protocols
  sml-graphql: Parsing & languages
  sml-lambda: Parsing & languages
  sml-sql: Databases & storage
  sml-fuzzy: Algorithms
  sml-stringalgo: Algorithms
  # Roguelike building blocks are game-dev, not generic pathfinding.
  sml-roguelike: Games & simulation
  # Markov chains are a stochastic-process / numerics topic here.
  sml-markov: Math, numeric & scientific
  # crc32 topic pulls it into Encoding; it's a write-ahead log.
  sml-wal: Databases & storage
  # serializer topic pulls it into Encoding; it's config.
  sml-ini: Text, Unicode & utilities
  # hashing topic pulls it into Cryptography; it's distributed.
  sml-consistenthash: Concurrency, effects & systems
  # optimization topic pulls it into Math; it's a graph/network-flow algorithm.
  sml-mincostflow: Algorithms
  # parser topic pulls ansi/vt into Parsing; they are terminal UI.
  sml-ansi: GUI, terminal & application UI
  sml-vt: GUI, terminal & application UI
  # ast topic pulls sml-sh into Developer tooling; it is a shell parser.
  sml-sh: Parsing & languages
  # geometry topic pulls sml-mesh into Algorithms; it is 3D graphics.
  sml-mesh: Graphics, geometry & imaging
  # serialization topic pulls sml-email into Encoding; it is a network protocol.
  sml-email: Web, networking & protocols
