# categories.yml -- drives how scripts/generate.py groups the sjqtentacles
# ecosystem libraries.
#
# Each library is placed in exactly ONE category: the FIRST category in this
# list (top to bottom) that has a topic in common with the repo's GitHub
# topics. So order matters -- put more specific / higher-priority categories
# first. The `Misc` category at the end is a safety net; if a repo lands there,
# add a topic mapping or an override rather than leaving it.
#
# `overrides` pins a specific repo to a specific category regardless of topics
# (use sparingly, for genuinely ambiguous cases).
#
# `ignore_topics` are language/build/meta topics that must never be used to
# categorize (they are present on nearly every repo).

ignore_topics:
  - standard-ml
  - sml
  - mlton
  - polyml
  - smlpkg
  - pure
  - functional-programming
  - functional
  - deterministic
  - reproducible
  - library
  - sjqtentacles-web
  - experimental
  - persistent
  - sans-io
  - impure
  - golden-testing

